<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmashCode - Técnico en Enfermería</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="sidebar" id="main-sidebar"></nav>

    <main class="content learning-path-view">
        <div class="main-column">
            <!-- Green Header Section -->
            <div class="unit-header">
                <div class="unit-info">
                    <div class="back-btn" id="header-competencia"></div>
                    <h1 id="header-title"></h1>
                </div>
                <button class="guide-btn" onclick="window.location.href='/guide.html'"><i class="fas fa-book-open"></i> GUÍA</button>
            </div>

            <!-- Dynamic Path -->
            <div class="path-container" id="path-container">
                <!-- Nodes rendered by JS -->
            </div>
        </div>

        <!-- POPOVER OVERLAY -->
        <div id="popover-overlay" class="popover-overlay" style="display:none;" onclick="closePopover()">
            <div id="lesson-popover" class="popover-box" onclick="event.stopPropagation()">
                <div class="popover-arrow"></div>
                <h4 id="popover-title"></h4>
                <p id="popover-subtitle"></p>
                <button class="btn-start-popover" id="popover-btn">EMPEZAR +10 EXP</button>
            </div>
        </div>

        <div class="side-column">
            <div class="right-stats-bar">
                <div class="stat"><img src="https://d35aaqx5ub95lt.cloudfront.net/images/flags/us.svg" width="25"></div>
                <div class="stat fire"><i class="fas fa-fire"></i> <span id="streak">0</span></div>
                <div class="stat gem"><i class="fas fa-gem"></i> <span id="gems">500</span></div>
                <div class="stat xp"><i class="fas fa-bolt"></i> <span id="total-xp">0 XP</span></div>
                <div class="stat heart"><i class="fas fa-heart"></i> 5</div>
            </div>

            <div class="card promo-card">
                <h3>¡Compite en las Ligas!</h3>
                <div class="promo-content">
                    <div class="lock-icon"><i class="fas fa-lock"></i></div>
                    <p>Completa 5 lecciones más para empezar a competir</p>
                </div>
            </div>

            <div class="card daily-card">
                <div class="card-header">
                    <h3>Desafíos del día</h3>
                    <a href="#">VER TODOS</a>
                </div>
                <div class="challenge-item">
                    <i class="fas fa-bolt"></i>
                    <div class="challenge-info">
                        <p>Gana 10 XP</p>
                        <div class="mini-progress-bar">
                            <div class="mini-progress-fill" id="level-progress" style="width: 0%;"></div>
                            <i class="fas fa-box"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card signup-card">
                <h3>¡Crea un perfil para guardar tu progreso!</h3>
                <button class="btn-create">CREAR PERFIL</button>
                <button class="btn-login">INGRESAR</button>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="js/shared.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
